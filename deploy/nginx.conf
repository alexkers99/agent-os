# Reverse proxy for Agent OS. Copy to /etc/nginx/sites-available/agent-os,
# symlink into sites-enabled, then `nginx -t && systemctl reload nginx`.
# Replace your-domain.com. After this works on :80, run certbot for TLS (see DEPLOY.md).

server {
    listen 80;
    server_name your-domain.com;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Critical for SSE (/api/events) and streamed chat — do NOT buffer.
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        chunked_transfer_encoding off;
    }
}
